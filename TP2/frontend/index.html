<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <title>TP2 — Docker Compose</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: sans-serif;
      max-width: 640px;
      margin: 40px auto;
      padding: 0 20px;
      color: #333;
    }
    h1 { color: #1a73e8; margin-bottom: 6px; }
    .subtitle { color: #888; font-size: 0.9em; margin-bottom: 30px; }
    form { display: flex; gap: 8px; margin-bottom: 30px; }
    input {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 1em;
    }
    button {
      padding: 10px 20px;
      background: #1a73e8;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 1em;
    }
    button:hover { background: #1558b0; }
    #liste { list-style: none; }
    #liste li {
      padding: 12px 16px;
      border-left: 3px solid #1a73e8;
      margin-bottom: 10px;
      background: #f8f9ff;
      border-radius: 0 6px 6px 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    #liste .date { color: #999; font-size: 0.8em; }
    .vide { color: #aaa; font-style: italic; padding: 20px 0; }
    .error { color: #d32f2f; background: #fdecea; padding: 10px 14px; border-radius: 6px; margin-bottom: 20px; }
    .status { font-size: 0.85em; padding: 4px 10px; border-radius: 12px; display: inline-block; margin-bottom: 20px; }
    .status.ok  { background: #e8f5e9; color: #2e7d32; }
    .status.err { background: #fdecea; color: #c62828; }
  </style>
</head>
<body>

  <h1>🐳 TP2 — Docker Compose</h1>
  <div class="subtitle">Frontend · API Node.js · PostgreSQL</div>

  <div id="status" class="status">Connexion à l'API...</div>

  <div id="error" class="error" style="display:none"></div>

  <form id="form">
    <input id="input" type="text" placeholder="Tape un message..." autofocus />
    <button type="submit">Envoyer</button>
  </form>

  <ul id="liste">
    <li class="vide">Chargement...</li>
  </ul>

  <script>
    // L'API est accessible via la variable d'env injectée par Nginx
    // ou en direct sur le port 3000 si on est en dev
    const API_URL = window.API_URL || "http://localhost:3000";

    const statusEl = document.getElementById("status");
    const errorEl  = document.getElementById("error");
    const listeEl  = document.getElementById("liste");
    const form     = document.getElementById("form");
    const input    = document.getElementById("input");

    function showError(msg) {
      errorEl.textContent = msg;
      errorEl.style.display = "block";
    }

    function hideError() {
      errorEl.style.display = "none";
    }

    function formatDate(iso) {
      return new Date(iso).toLocaleString("fr-FR");
    }

    async function chargerMessages() {
      try {
        const res = await fetch(`${API_URL}/messages`);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const messages = await res.json();
        hideError();
        statusEl.textContent = "API connectée ✓";
        statusEl.className = "status ok";

        if (messages.length === 0) {
          listeEl.innerHTML = `<li class="vide">Aucun message — envoie le premier !</li>`;
          return;
        }

        listeEl.innerHTML = messages.map(m => `
          <li>
            <span>${m.texte}</span>
            <span class="date">${formatDate(m.created_at)}</span>
          </li>
        `).join("");
      } catch (err) {
        statusEl.textContent = "API non joignable ✗";
        statusEl.className = "status err";
        showError(`Impossible de joindre l'API sur ${API_URL}/messages — vérifie que les services tournent.`);
        listeEl.innerHTML = `<li class="vide">Aucun message chargé.</li>`;
      }
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const texte = input.value.trim();
      if (!texte) return;

      try {
        const res = await fetch(`${API_URL}/messages`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ texte }),
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        input.value = "";
        await chargerMessages();
      } catch (err) {
        showError(`Erreur lors de l'envoi : ${err.message}`);
      }
    });

    // Chargement initial
    chargerMessages();
  </script>

</body>
</html>
